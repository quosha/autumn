spring:
  application:
    name: autumn
  datasource:
    url: jdbc:h2:file:./data/db;AUTO_SERVER=TRUE
    username: sa
    password: password
    driverClassName: org.h2.Driver
    initialization-mode: embedded
  jpa:
    hibernate:
      ddl-auto: update
      show-sql: true
    database-platform: org.hibernate.dialect.H2Dialect